<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>{% block title %}Apple領収書コレクター{% endblock %}</title>
<style>
  html { font-size: 17px; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
         max-width: 960px; margin: 0 auto; padding: 0 20px 48px; color: #1a1a1a; line-height: 1.85; background: #fff; }
  h1 { font-size: 28px; border-bottom: 3px solid #007aff; padding-bottom: 10px; margin-top: 28px; }
  h2 { font-size: 22px; margin-top: 36px; }
  h3 { font-size: 18px; margin-top: 24px; color: #007aff; }
  p { font-size: 16px; }
  .card { background: #f5f5f7; border-radius: 10px; padding: 20px 22px; margin: 16px 0; font-size: 16px; }
  .card p { font-size: 16px; }
  .card li { font-size: 16px; }
  .card ul, .card ol { padding-left: 24px; }
  .ok { color: #2a7c2a; font-weight: 600; }
  .warn { color: #c9560f; font-weight: 600; }
  .err { color: #c93030; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  th, td { padding: 10px 10px; text-align: left; border-bottom: 1px solid #e5e5ea; vertical-align: top; }
  th { background: #fafafa; font-weight: 600; font-size: 14px; }
  button, .btn { background: #007aff; color: white; border: none; padding: 11px 20px;
                 border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 500;
                 text-decoration: none; display: inline-block; }
  button:hover, .btn:hover { background: #0064d2; }
  .btn-danger { background: #d23030; }
  .btn-danger:hover { background: #b02020; }
  .btn-secondary { background: #8e8e93; }
  .badge { background: #e5e5ea; padding: 3px 12px; border-radius: 12px; font-size: 14px; }
  .small { font-size: 14px; color: #666; }
  pre { background: #1a1a1a; color: #e5e5ea; padding: 14px; border-radius: 8px;
        font-size: 13px; max-height: 320px; overflow-y: auto; }
  .empty { color: #888; font-style: italic; font-size: 15px; }

  /* Tab nav */
  .tabnav { display: flex; gap: 6px; border-bottom: 2px solid #e5e5ea;
            margin-top: 24px; padding-top: 10px; position: sticky; top: 0;
            background: #fff; z-index: 10; }
  .tabnav a { padding: 12px 22px; text-decoration: none; color: #444;
              border-radius: 10px 10px 0 0; font-size: 16px; font-weight: 600; }
  .tabnav a:hover { background: #f5f5f7; }
  .tabnav a.active { background: #007aff; color: white; }

  /* Guide-specific */
  .step { background: white; border-left: 5px solid #007aff; padding: 18px 22px;
          margin: 20px 0; border-radius: 0 10px 10px 0; box-shadow: 0 2px 6px rgba(0,0,0,0.07);
          font-size: 16px; }
  .step-head { font-weight: 700; color: #007aff; font-size: 17px; margin-bottom: 10px; }
  .step p { font-size: 16px; }
  .step ol { margin: 10px 0; padding-left: 24px; }
  .step li { margin: 8px 0; font-size: 16px; }
  .callout { background: #fff8e1; border-left: 5px solid #f5a623;
             padding: 14px 18px; margin: 16px 0; border-radius: 0 8px 8px 0; font-size: 15px; }
  .callout.danger { background: #ffe8e8; border-left-color: #c93030; }
  .callout.success { background: #e8f5e9; border-left-color: #2a7c2a; }
  code { background: #eef0f3; padding: 3px 8px; border-radius: 4px;
         font-family: "SF Mono", Menlo, monospace; font-size: 14px; color: #c93066; }
  .copy-block { display: flex; align-items: center; gap: 10px; background: #f0f4ff;
                border: 1px solid #c0d4ff; padding: 10px 14px; border-radius: 8px;
                font-family: "SF Mono", Menlo, monospace; font-size: 15px; margin: 8px 0; }
  .copy-block code { background: transparent; padding: 0; color: #1a1a1a; font-size: 15px; }
  .copy-btn { background: #007aff; color: white; border: none;
              padding: 6px 14px; border-radius: 5px; cursor: pointer;
              font-size: 13px; margin-left: auto; }
  .toc { background: #fafbfc; padding: 16px 22px; border-radius: 8px;
         border: 1px solid #e5e5ea; font-size: 15px; }
  .toc strong { font-size: 16px; }
  .toc a { color: #007aff; text-decoration: none; }
  .toc a:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav class="tabnav">
  <a href="{{ url_for('index') }}" class="{% if active_tab == 'home' %}active{% endif %}">🏠 ホーム</a>
  <a href="{{ url_for('guide') }}" class="{% if active_tab == 'guide' %}active{% endif %}">📘 使い方ガイド</a>
  <a href="{{ url_for('logout') }}" style="margin-left:auto; color:#888; font-size:14px; padding-top:14px;">ログアウト</a>
</nav>

{% block content %}{% endblock %}

</body>
</html>
