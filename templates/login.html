<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログイン - Apple領収書コレクター</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
         background: #f0f4ff; min-height: 100vh; display: flex; align-items: center;
         justify-content: center; margin: 0; }
  .login-card { background: white; padding: 40px; border-radius: 14px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.08); width: 100%; max-width: 380px; }
  h1 { font-size: 24px; margin: 0 0 8px; color: #1a1a1a; }
  .small { font-size: 14px; color: #666; margin: 0 0 24px; }
  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #333; }
  input[type=password] { width: 100%; padding: 12px 14px; font-size: 16px;
                          border: 1px solid #d0d4dc; border-radius: 8px;
                          box-sizing: border-box; }
  input[type=password]:focus { outline: none; border-color: #007aff; }
  button { width: 100%; background: #007aff; color: white; border: none;
           padding: 12px; border-radius: 8px; font-size: 16px; font-weight: 600;
           cursor: pointer; margin-top: 16px; }
  button:hover { background: #0064d2; }
  .err { color: #c93030; font-size: 14px; margin-top: 12px; }
</style>
</head>
<body>
  <div class="login-card">
    <h1>📧 Apple領収書コレクター</h1>
    <p class="small">パスワードを入力してログインしてください</p>
    <form method="post">
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">ログイン</button>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
    </form>
  </div>
</body>
</html>
